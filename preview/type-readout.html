<!DOCTYPE html><html lang="en"><head><meta charset="utf-8">
<link rel="stylesheet" href="../colors_and_type.css">
<style>
  body{margin:0;background:var(--ink-1000);color:var(--fg);font-family:var(--font-body);height:170px;display:flex;align-items:center;gap:40px;padding:0 36px}
  .lbl{font-family:var(--font-mono);font-weight:700;font-size:9px;letter-spacing:0.2em;text-transform:uppercase;color:var(--fg-3);margin:0 0 6px}
  .readout{font-family:var(--font-mono);font-weight:700;font-variant-numeric:tabular-nums;letter-spacing:-0.02em;color:var(--signal)}
  .unit{font-family:var(--font-mono);font-weight:700;font-size:13px;letter-spacing:0.18em;color:var(--fg-3)}
</style></head>
<body>
  <div>
    <p class="lbl">Mono readout</p>
    <span class="readout" style="font-size:72px">100</span> <span class="unit">BPM</span>
  </div>
  <div style="display:flex;gap:22px">
    <div><p class="lbl">Step</p><span class="readout" style="font-size:34px;color:var(--fg)">04</span><span class="readout" style="font-size:34px;color:var(--fg-3)">/08</span></div>
    <div><p class="lbl">Pattern</p><span class="readout" style="font-size:34px;color:var(--fg)">1 · 3</span></div>
  </div>
</body></html>
