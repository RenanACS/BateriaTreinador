<!DOCTYPE html><html lang="en"><head><meta charset="utf-8">
<link rel="stylesheet" href="../colors_and_type.css">
<style>
  body{margin:0;background:radial-gradient(ellipse 120% 90% at 50% -20%,#161619,transparent 60%),var(--ink-1000);color:var(--fg);font-family:var(--font-body);height:150px;display:flex;align-items:center;justify-content:center;gap:26px}
  .mark{color:var(--signal)}
  .word{display:inline-flex;align-items:center;gap:4px;color:var(--signal)}
  .word span{font-family:var(--font-display);font-weight:800;font-size:64px;letter-spacing:-0.05em;line-height:1}
</style></head>
<body>
  <svg class="mark" width="86" height="86" viewBox="0 0 120 120" fill="none">
    <circle cx="60" cy="60" r="50" stroke="currentColor" stroke-width="3.5"/>
    <circle cx="60" cy="60" r="38" stroke="currentColor" stroke-width="1.5" opacity="0.5"/>
    <circle cx="60" cy="60" r="5.5" fill="currentColor"/>
    <g fill="currentColor"><circle cx="60" cy="6.5" r="3.4"/><circle cx="97.9" cy="22.1" r="3.4"/><circle cx="113.5" cy="60" r="3.4"/><circle cx="97.9" cy="97.9" r="3.4"/><circle cx="60" cy="113.5" r="3.4"/><circle cx="22.1" cy="97.9" r="3.4"/><circle cx="6.5" cy="60" r="3.4"/><circle cx="22.1" cy="22.1" r="3.4"/></g>
  </svg>
  <div class="word">
    <span>drumi</span>
    <svg width="50" height="50" viewBox="0 0 40 40" fill="none" style="margin-bottom:-3px"><circle cx="20" cy="20" r="16.5" stroke="#FCFCFD" stroke-width="7.4"/><circle cx="20" cy="20" r="3" fill="#FCFCFD"/></svg>
  </div>
</body></html>
