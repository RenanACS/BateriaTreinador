<!DOCTYPE html><html lang="en"><head><meta charset="utf-8">
<link rel="stylesheet" href="../colors_and_type.css">
<style>
  body{margin:0;background:var(--ink-900);color:var(--fg);font-family:var(--font-body);padding:20px 24px}
  .lbl{font-family:var(--font-mono);font-weight:700;font-size:9px;letter-spacing:0.2em;text-transform:uppercase;color:var(--fg-3);margin:0 0 16px}
  .row{display:flex;align-items:flex-end;gap:14px}
  .col{display:flex;flex-direction:column;align-items:flex-start;gap:6px}
  .bar{background:var(--signal);height:14px;border-radius:2px}
  .n{font-family:var(--font-mono);font-size:10px;color:var(--fg-3)}
</style></head>
<body>
  <p class="lbl">Spacing scale (px)</p>
  <div class="row">
    <div class="col"><div class="bar" style="width:4px"></div><span class="n">4</span></div>
    <div class="col"><div class="bar" style="width:8px"></div><span class="n">8</span></div>
    <div class="col"><div class="bar" style="width:12px"></div><span class="n">12</span></div>
    <div class="col"><div class="bar" style="width:16px"></div><span class="n">16</span></div>
    <div class="col"><div class="bar" style="width:24px"></div><span class="n">24</span></div>
    <div class="col"><div class="bar" style="width:32px"></div><span class="n">32</span></div>
    <div class="col"><div class="bar" style="width:48px"></div><span class="n">48</span></div>
    <div class="col"><div class="bar" style="width:64px"></div><span class="n">64</span></div>
    <div class="col"><div class="bar" style="width:96px"></div><span class="n">96</span></div>
  </div>
</body></html>
