<!DOCTYPE html><html lang="en"><head><meta charset="utf-8">
<link rel="stylesheet" href="../colors_and_type.css">
<style>
  body{margin:0;background:var(--ink-1000);color:var(--fg);font-family:var(--font-body);height:150px;display:flex;flex-direction:column;align-items:center;justify-content:center;gap:18px}
  .lbl{font-family:var(--font-mono);font-weight:700;font-size:9px;letter-spacing:0.2em;text-transform:uppercase;color:var(--fg-3)}
  .row{display:flex;gap:18px}
  .col{display:flex;flex-direction:column;align-items:center;gap:8px}
  .led{width:13px;height:13px;border-radius:50%}
  .on{background:var(--signal)}
  .accent{box-shadow:0 0 16px rgba(252,252,253,.8)}
  .glow{box-shadow:0 0 10px rgba(252,252,253,.5)}
  .off{background:var(--ink-700);border:1px solid var(--ink-600);box-shadow:var(--inset-well)}
  .n{font-family:var(--font-mono);font-size:9px}
</style></head>
<body>
  <span class="lbl">Count-in LEDs — accent on beat 1</span>
  <div class="row">
    <div class="col"><span class="led on accent"></span><span class="n" style="color:var(--fg)">1</span></div>
    <div class="col"><span class="led off"></span><span class="n" style="color:var(--fg-3)">2</span></div>
    <div class="col"><span class="led off"></span><span class="n" style="color:var(--fg-3)">3</span></div>
    <div class="col"><span class="led off"></span><span class="n" style="color:var(--fg-3)">4</span></div>
  </div>
</body></html>
