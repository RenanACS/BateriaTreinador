<!DOCTYPE html><html lang="en"><head><meta charset="utf-8">
<link rel="stylesheet" href="../colors_and_type.css">
<style>
  body{margin:0;font-family:var(--font-body);height:170px;display:grid;grid-template-columns:1fr 1fr}
  .cell{display:flex;flex-direction:column;align-items:center;justify-content:center;gap:12px}
  .dark{background:var(--ink-1000)}
  .light{background:var(--paper)}
  .dark .mark{color:var(--signal)} .light .mark{color:var(--paper-ink)}
  .tag{font-family:var(--font-mono);font-weight:700;font-size:10px;letter-spacing:0.22em;text-transform:uppercase}
  .dark .tag{color:var(--fg-3)} .light .tag{color:#6a6a72}
</style></head>
<body>
  <div class="cell dark">
    <svg class="mark" width="72" height="72" viewBox="0 0 120 120" fill="none"><circle cx="60" cy="60" r="50" stroke="currentColor" stroke-width="3.5"/><circle cx="60" cy="60" r="38" stroke="currentColor" stroke-width="1.5" opacity="0.5"/><circle cx="60" cy="60" r="5.5" fill="currentColor"/><g fill="currentColor"><circle cx="60" cy="6.5" r="3.4"/><circle cx="97.9" cy="22.1" r="3.4"/><circle cx="113.5" cy="60" r="3.4"/><circle cx="97.9" cy="97.9" r="3.4"/><circle cx="60" cy="113.5" r="3.4"/><circle cx="22.1" cy="97.9" r="3.4"/><circle cx="6.5" cy="60" r="3.4"/><circle cx="22.1" cy="22.1" r="3.4"/></g></svg>
    <span class="tag">on near-black</span>
  </div>
  <div class="cell light">
    <svg class="mark" width="72" height="72" viewBox="0 0 120 120" fill="none"><circle cx="60" cy="60" r="50" stroke="currentColor" stroke-width="3.5"/><circle cx="60" cy="60" r="38" stroke="currentColor" stroke-width="1.5" opacity="0.5"/><circle cx="60" cy="60" r="5.5" fill="currentColor"/><g fill="currentColor"><circle cx="60" cy="6.5" r="3.4"/><circle cx="97.9" cy="22.1" r="3.4"/><circle cx="113.5" cy="60" r="3.4"/><circle cx="97.9" cy="97.9" r="3.4"/><circle cx="60" cy="113.5" r="3.4"/><circle cx="22.1" cy="97.9" r="3.4"/><circle cx="6.5" cy="60" r="3.4"/><circle cx="22.1" cy="22.1" r="3.4"/></g></svg>
    <span class="tag">on paper</span>
  </div>
</body></html>
