<!DOCTYPE html><html lang="en"><head><meta charset="utf-8">
<link rel="stylesheet" href="../colors_and_type.css">
<style>
  body{margin:0;background:var(--surface);color:var(--fg);font-family:var(--font-body);padding:26px 28px}
  .head{display:flex;align-items:baseline;justify-content:space-between;margin-bottom:12px}
  .lbl{font-family:var(--font-mono);font-weight:700;font-size:11px;letter-spacing:0.22em;text-transform:uppercase;color:var(--fg-3)}
  .read{font-family:var(--font-mono);font-weight:700;font-size:30px;color:var(--fg)}
  .read .u{font-size:12px;color:var(--fg-3);letter-spacing:0.18em}
  .track-wrap{position:relative;height:24px;display:flex;align-items:center}
  .track{position:absolute;left:0;right:0;height:8px;border-radius:999px;background:var(--ink-1000);box-shadow:var(--inset-well)}
  .fill{position:absolute;left:0;width:42%;height:8px;border-radius:999px;background:linear-gradient(90deg,var(--ink-400),var(--signal))}
  .thumb{position:absolute;left:42%;width:22px;height:22px;border-radius:50%;background:var(--white);border:3px solid var(--ink-700);box-shadow:0 0 10px rgba(252,252,253,.35),0 2px 6px rgba(0,0,0,.6);transform:translateX(-50%)}
</style></head>
<body>
  <div class="head"><span class="lbl">Tempo · Speed</span><span class="read">100 <span class="u">BPM</span></span></div>
  <div class="track-wrap"><div class="track"></div><div class="fill"></div><div class="thumb"></div></div>
</body></html>
