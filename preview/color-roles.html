<!DOCTYPE html><html lang="en"><head><meta charset="utf-8">
<link rel="stylesheet" href="../colors_and_type.css">
<style>
  body{margin:0;background:var(--ink-900);color:var(--fg);font-family:var(--font-body);padding:22px 24px}
  .lbl{font-family:var(--font-mono);font-weight:700;font-size:10px;letter-spacing:0.22em;text-transform:uppercase;color:var(--fg-3);margin:0 0 14px}
  .grid{display:grid;grid-template-columns:repeat(3,1fr);gap:10px}
  .item{display:flex;align-items:center;gap:10px}
  .chip{width:34px;height:34px;border-radius:var(--r-sm);flex-shrink:0;border:1px solid var(--hairline)}
  .meta b{font-family:var(--font-mono);font-size:11px;font-weight:700;display:block}
  .meta span{font-size:10px;color:var(--fg-3)}
</style></head>
<body>
  <p class="lbl">Semantic roles</p>
  <div class="grid">
    <div class="item"><div class="chip" style="background:var(--bg)"></div><div class="meta"><b>bg</b><span>canvas</span></div></div>
    <div class="item"><div class="chip" style="background:var(--surface)"></div><div class="meta"><b>surface</b><span>panel</span></div></div>
    <div class="item"><div class="chip" style="background:var(--surface-raised)"></div><div class="meta"><b>raised</b><span>card face</span></div></div>
    <div class="item"><div class="chip" style="background:var(--well)"></div><div class="meta"><b>well</b><span>recessed</span></div></div>
    <div class="item"><div class="chip" style="background:var(--border)"></div><div class="meta"><b>border</b><span>structural</span></div></div>
    <div class="item"><div class="chip" style="background:var(--fg)"></div><div class="meta"><b>fg</b><span>text</span></div></div>
    <div class="item"><div class="chip" style="background:var(--fg-2)"></div><div class="meta"><b>fg-2</b><span>secondary</span></div></div>
    <div class="item"><div class="chip" style="background:var(--fg-3)"></div><div class="meta"><b>fg-3</b><span>muted</span></div></div>
    <div class="item"><div class="chip" style="background:var(--signal);box-shadow:0 0 14px rgba(252,252,253,.4)"></div><div class="meta"><b>signal</b><span>active/hit</span></div></div>
  </div>
</body></html>
