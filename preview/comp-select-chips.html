<!DOCTYPE html><html lang="en"><head><meta charset="utf-8">
<link rel="stylesheet" href="../colors_and_type.css">
<style>
  body{margin:0;background:var(--ink-900);color:var(--fg);font-family:var(--font-body);padding:22px 24px}
  .lbl{font-family:var(--font-mono);font-weight:700;font-size:9px;letter-spacing:0.2em;text-transform:uppercase;color:var(--fg-3);margin:0 0 12px}
  .chips{display:flex;flex-wrap:wrap;gap:8px;margin-bottom:20px}
  .chip{padding:7px 14px;border-radius:999px;font-family:var(--font-mono);font-size:12px;font-weight:700;letter-spacing:0.02em}
  .on{background:var(--signal);color:var(--fg-invert);box-shadow:0 0 10px rgba(252,252,253,.35)}
  .off{background:var(--ink-750);color:var(--fg-2);border:1px solid var(--border-soft);box-shadow:var(--bevel)}
  .sel{width:200px;height:38px;padding:0 12px;display:flex;align-items:center;justify-content:space-between;background:var(--ink-700);color:var(--fg);border:1px solid var(--border-soft);border-radius:var(--r-md);box-shadow:var(--bevel);font-family:var(--font-mono);font-size:12px;font-weight:700}
  .menu{width:200px;margin-top:6px;background:var(--ink-800);border:1px solid var(--border);border-radius:var(--r-md);box-shadow:var(--shadow-3);padding:4px}
  .opt{padding:9px 10px;border-radius:var(--r-sm);display:flex;justify-content:space-between;font-family:var(--font-mono);font-size:12px;font-weight:700}
  .opt.a{background:var(--signal);color:var(--fg-invert)}
  .opt .s{opacity:.55;font-size:10px}
  .wrap{display:flex;gap:26px;align-items:flex-start}
</style></head>
<body>
  <p class="lbl">Groove chips &amp; pattern select</p>
  <div class="chips">
    <span class="chip on">Rock</span><span class="chip off">Linear</span><span class="chip off">Paradiddle</span><span class="chip off">Metronome</span>
  </div>
  <div class="wrap">
    <div><div class="sel"><span>Beats 1 &amp; 3</span><span style="opacity:.5">▾</span></div></div>
    <div class="menu">
      <div class="opt"><span>Quarters</span><span class="s">1 2 3 4</span></div>
      <div class="opt a"><span>Beats 1 &amp; 3</span><span class="s">1 · 3</span></div>
      <div class="opt"><span>Offbeats</span><span class="s">&amp; &amp; &amp;</span></div>
    </div>
  </div>
</body></html>
