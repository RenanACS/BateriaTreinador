<!DOCTYPE html><html lang="en"><head><meta charset="utf-8">
<link rel="stylesheet" href="../colors_and_type.css">
<style>
  body{margin:0;background:var(--ink-900);color:var(--fg);font-family:var(--font-body);padding:22px 24px}
  .row{display:flex;gap:0;border-radius:var(--r-md);overflow:hidden;border:1px solid var(--border-soft)}
  .sw{flex:1;height:86px;display:flex;align-items:flex-end;justify-content:center;padding-bottom:8px}
  .sw span{font-family:var(--font-mono);font-size:9px;letter-spacing:0.04em}
  .lbl{font-family:var(--font-mono);font-weight:700;font-size:10px;letter-spacing:0.22em;text-transform:uppercase;color:var(--fg-3);margin:0 0 14px}
</style></head>
<body>
  <p class="lbl">Grayscale ramp — the entire palette</p>
  <div class="row">
    <div class="sw" style="background:#060607"><span style="color:#8C8C96">060607</span></div>
    <div class="sw" style="background:#0A0A0C"><span style="color:#8C8C96">0A0A0C</span></div>
    <div class="sw" style="background:#161619"><span style="color:#B6B6BE">161619</span></div>
    <div class="sw" style="background:#232328"><span style="color:#B6B6BE">232328</span></div>
    <div class="sw" style="background:#3C3C44"><span style="color:#DEDEE2">3C3C44</span></div>
    <div class="sw" style="background:#6A6A74"><span style="color:#0A0A0C">6A6A74</span></div>
    <div class="sw" style="background:#8C8C96"><span style="color:#0A0A0C">8C8C96</span></div>
    <div class="sw" style="background:#B6B6BE"><span style="color:#0A0A0C">B6B6BE</span></div>
    <div class="sw" style="background:#DEDEE2"><span style="color:#0A0A0C">DEDEE2</span></div>
    <div class="sw" style="background:#FCFCFD"><span style="color:#0A0A0C">FCFCFD</span></div>
  </div>
</body></html>
